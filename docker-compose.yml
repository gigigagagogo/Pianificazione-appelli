services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appelli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appelli}
      POSTGRES_DB: ${POSTGRES_DB:-appelli}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-appelli}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./AppelliWorkspace
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-appelli}:${POSTGRES_PASSWORD:-appelli}@postgres:5432/${POSTGRES_DB:-appelli}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-appelli}
      PGPASSWORD: ${POSTGRES_PASSWORD:-appelli}
      PGDATABASE: ${POSTGRES_DB:-appelli}
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
    ports:
      - '${API_PORT:-3000}:3000'

  interface:
    build:
      context: ./AppelliWorkspace
      dockerfile: apps/interface/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${INTERFACE_PORT:-4200}:80'

volumes:
  postgres-data:
